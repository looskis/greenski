name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  source:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify tag matches Cargo version
        run: test "${GITHUB_REF_NAME#v}" = "$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
      - name: Test package
        run: cargo test --locked
      - name: Build deterministic source archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          git archive --format=tar --prefix="greenski-${VERSION}/" "$GITHUB_REF_NAME" | gzip -n > "dist/greenski-${VERSION}.tar.gz"
          shasum -a 256 "dist/greenski-${VERSION}.tar.gz" > "dist/greenski-${VERSION}.tar.gz.sha256"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
